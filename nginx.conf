events { worker_connections 1024; }

http {
  # Docker's internal DNS resolver — forces hostname re-resolution on every request.
  # WITHOUT this, nginx caches the IP at startup time. When a container restarts
  # and gets a new IP, nginx keeps trying the old IP → Connection refused → 502.
  # With this, nginx re-resolves auth/user/search etc. via Docker DNS every 5s.
  resolver 127.0.0.11 valid=5s ipv6=off;
  resolver_timeout 3s;

  server {
    listen 3000;

    # Gateway health check — nginx itself
    location = /health {
      access_log off;
      return 200 '{"status":"ok","service":"gateway"}';
      add_header Content-Type application/json;
    }

    location ~ ^/api/v1/auth/ {
      set $u auth:3001;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/v1/trust/ {
      set $u trust:3004;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/v1/(ratings|consumer-ratings)/ {
      set $u rating:3005;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/v1/ratings       { set $u rating:3005; proxy_pass http://$u; }
    location = /api/v1/consumer-ratings { set $u rating:3005; proxy_pass http://$u; }
    location ~ ^/api/v1/consumers/me/trust {
      set $u rating:3005;
      proxy_pass http://$u;
      proxy_set_header Host $host;
    }

    location ~ ^/api/v1/notifications {
      set $u notification:3006;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/v1/(subscriptions|referrals|payments)/ {
      set $u payment:3007;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/v1/providers/me/analytics {
      set $u admin:3009;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/v1/admin/ {
      set $u admin:3009;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/v2/ {
      set $u trust:3004;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/v1/(search|categories|cities) {
      set $u search:3003;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/v1/providers/[0-9a-f-]{36}$ {
      set $u search:3003;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      set $u user:3002;
      proxy_pass http://$u;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
