events { worker_connections 1024; }

http {
  upstream auth        { server auth:3001; }
  upstream user        { server user:3002; }
  upstream search      { server search:3003; }
  upstream trust       { server trust:3004; }
  upstream rating      { server rating:3005; }
  upstream notification { server notification:3006; }
  upstream payment     { server payment:3007; }
  upstream admin       { server admin:3009; }

  server {
    listen 3000;

    # Auth
    location ~ ^/api/v1/auth/ {
      proxy_pass http://auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Trust
    location ~ ^/api/v1/trust/ {
      proxy_pass http://trust;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Ratings / consumer-ratings
    location ~ ^/api/v1/(ratings|consumer-ratings)/ {
      proxy_pass http://rating;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/v1/ratings {
      proxy_pass http://rating;
    }
    location = /api/v1/consumer-ratings {
      proxy_pass http://rating;
    }
    location ~ ^/api/v1/consumers/me/trust {
      proxy_pass http://rating;
      proxy_set_header Host $host;
    }

    # Notifications
    location ~ ^/api/v1/notifications/ {
      proxy_pass http://notification;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Subscriptions / referrals / payments
    location ~ ^/api/v1/(subscriptions|referrals)/ {
      proxy_pass http://payment;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Provider analytics (admin service)
    location ~ ^/api/v1/providers/me/analytics {
      proxy_pass http://admin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Search / categories / cities
    location ~ ^/api/v1/(search|categories|cities)/ {
      proxy_pass http://search;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/v1/categories { proxy_pass http://search; }
    location = /api/v1/cities     { proxy_pass http://search; }
    location ~ ^/api/v1/search    { proxy_pass http://search; }

    # Provider public profile — UUID path → search service
    location ~ ^/api/v1/providers/[0-9a-f]+-[0-9a-f]+-[0-9a-f]+-[0-9a-f]+-[0-9a-f]+$ {
      proxy_pass http://search;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin panel
    location ~ ^/api/v1/admin/ {
      proxy_pass http://admin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # TaaS B2B API
    location ~ ^/api/v2/ {
      proxy_pass http://trust;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Bare notifications path (no trailing slash)
    location = /api/v1/notifications {
      proxy_pass http://notification;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Payment webhook
    location ~ ^/api/v1/payments/ {
      proxy_pass http://payment;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # User service — everything else
    location / {
      proxy_pass http://user;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
