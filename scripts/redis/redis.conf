# =============================================================================
# SatvAAh — Redis 7 Configuration (Development)
# =============================================================================

# Persistence — RDB snapshots
save 900 1
save 300 10
save 60 10000

# AOF for durability in dev
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Connections
tcp-keepalive 300
timeout 0
tcp-backlog 511
maxclients 256

# Logging
loglevel notice
logfile ""

# Security (password set via CLI --requirepass in docker-compose command)
protected-mode yes

# Keyspace notifications (for session expiry events)
notify-keyspace-events "Ex"

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100
